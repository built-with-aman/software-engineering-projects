<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Registration</title>
    
</head>
<body>
    <header>
    <a href="index.html">
        <img src="../Multimedia/new_cn_logo.svg" alt="Coding Ninjas Logo">
    </a>
    
    </header>

    
    <main>
    <article>
        <h1>Student Registration</h1> <hr>

        <p>
            Join Coding Ninjas and start your learning journey. Fill in the
            registration form below to enroll in your preferred course.
        </p>

        <form action="#" method="post">

            <fieldset>
                <legend><b>Personal Information</b></legend>

                <label for="fname">First Name:</label><br>
                <input type="text" id="fname" name="fname" required><br><br>

                <label for="lname">Last Name:</label><br>
                <input type="text" id="lname" name="lname" required><br><br>

                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <!-- ADDING COUNTRY CODE WITH PHONE NO.-->
                <label for="phone">Phone Number:</label><br>
                <select id="country-code" name="country-code" required>
                    <option value="+91">+91</option>
                    <option value="+1">+1</option>
                    <option value="+44">+44</option>
                    <option value="+61">+61</option>
                    <option value="+971">+971</option>
                </select>

                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    placeholder="9876543210"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                    required>

                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob"><br><br>

                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender">
                <label for="other">Other</label>
            </fieldset>

            <br>

            <fieldset>
                <legend><b>Course Details</b></legend>

                <label for="course">Select Course:</label><br>
                <select id="course" name="course">
                    <option>Web Development</option>
                    <option>Data Science</option>
                    <option>Android Development</option>
                    <option>Digital Marketing</option>
                </select><br><br>

                <label for="mode">Learning Mode:</label><br>
                <select id="mode" name="mode">
                    <option>Online</option>
                    <option>Offline</option>
                </select><br><br>

                <label for="batch">Preferred Batch:</label><br>
                <input type="month" id="batch" name="batch">
            </fieldset>

            <br>

            <fieldset>
                <legend><b>Account Details</b></legend>

                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" required><br><br>

                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" required><br><br>

                <label for="confirm">Confirm Password:</label><br>
                <input type="password" id="confirm" name="confirm" required>
            </fieldset>

            <br>

            <fieldset>
                <legend><b>Additional Information</b></legend>

                <label for="about">Why do you want to join Coding Ninjas?</label><br>
                <textarea id="about" name="about" rows="5" cols="40"></textarea>

                <br><br>

                <input type="checkbox" id="terms" required>
                <label for="terms">
                    I agree to the Terms & Conditions and Privacy Policy.
                </label>
            </fieldset>

            <br>

            <input type="submit" value="Register">
            <input type="reset" value="Clear Form">

        </form>
    </article>
</main>
</body>
</html>
